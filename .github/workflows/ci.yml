name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # main runs the full test suite inside deploy.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + tests (unit + Testcontainers IT)
        run: ./mvnw -B verify
