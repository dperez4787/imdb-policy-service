<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMDb Graph Governance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🛡️</span>
      <div>
        <h1>IMDb Graph Governance</h1>
        <div class="brand-sub">declare at the edge · decide at the center · enforce at the gate</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="rev-chip" id="rev-chip" title="Current policy bundle revision">bundle rev —</span>
      <button class="token-btn" id="token-btn">Set admin token</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="fields">Governed fields</button>
    <button class="tab" data-view="subgraphs">Subgraphs</button>
    <button class="tab" data-view="playground">Playground</button>
    <button class="tab" data-view="audit">Audit</button>
  </nav>

  <main id="main" class="content"></main>

  <dialog id="token-dialog">
    <form method="dialog" class="token-form">
      <h2>Admin token</h2>
      <p class="dim">Required for policy edits, the subgraph view detail, and the audit log.
      Stored in this tab's session only.</p>
      <input type="password" id="token-input" placeholder="POLICY_ADMIN_TOKEN" autocomplete="off">
      <div class="dialog-actions">
        <button value="clear" class="ghost">Clear</button>
        <button value="save" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
